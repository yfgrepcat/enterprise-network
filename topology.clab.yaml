name: enterprise-ospf-bgp

mgmt:
  network: clab-mgmt
  ipv4-subnet: 172.20.20.0/24

topology:
  kinds:
    nokia_srlinux:
      image: ghcr.io/nokia/srlinux:24.10.7
      type: ixr-d2

  nodes:
    P1:
      kind: nokia_srlinux
      mgmt-ipv4: 172.20.20.11
      group: core
      startup-config: |
        set / interface ethernet-1/1 admin-state enable
        set / interface ethernet-1/1 subinterface 0 admin-state enable
        set / interface ethernet-1/1 subinterface 0 ipv4 admin-state enable
        set / interface ethernet-1/1 subinterface 0 ipv4 address 10.1.12.0/31
        set / interface ethernet-1/2 admin-state enable
        set / interface ethernet-1/2 subinterface 0 admin-state enable
        set / interface ethernet-1/2 subinterface 0 ipv4 admin-state enable
        set / interface ethernet-1/2 subinterface 0 ipv4 address 10.1.13.0/31
        set / interface ethernet-1/3 admin-state enable
        set / interface ethernet-1/3 subinterface 0 admin-state enable
        set / interface ethernet-1/3 subinterface 0 ipv4 admin-state enable
        set / interface ethernet-1/3 subinterface 0 ipv4 address 10.1.14.0/31
        set / interface ethernet-1/10 admin-state enable
        set / interface ethernet-1/10 subinterface 0 admin-state enable
        set / interface ethernet-1/10 subinterface 0 ipv4 admin-state enable
        set / interface ethernet-1/10 subinterface 0 ipv4 address 10.2.1.0/31

    P2:
      kind: nokia_srlinux
      mgmt-ipv4: 172.20.20.12
      group: core
      startup-config: |
        set / interface ethernet-1/1 admin-state enable
        set / interface ethernet-1/1 subinterface 0 admin-state enable
        set / interface ethernet-1/1 subinterface 0 ipv4 admin-state enable
        set / interface ethernet-1/1 subinterface 0 ipv4 address 10.1.12.1/31
        set / interface ethernet-1/2 admin-state enable
        set / interface ethernet-1/2 subinterface 0 admin-state enable
        set / interface ethernet-1/2 subinterface 0 ipv4 admin-state enable
        set / interface ethernet-1/2 subinterface 0 ipv4 address 10.1.23.0/31
        set / interface ethernet-1/3 admin-state enable
        set / interface ethernet-1/3 subinterface 0 admin-state enable
        set / interface ethernet-1/3 subinterface 0 ipv4 admin-state enable
        set / interface ethernet-1/3 subinterface 0 ipv4 address 10.1.24.0/31
        set / interface ethernet-1/10 admin-state enable
        set / interface ethernet-1/10 subinterface 0 admin-state enable
        set / interface ethernet-1/10 subinterface 0 ipv4 admin-state enable
        set / interface ethernet-1/10 subinterface 0 ipv4 address 10.2.2.0/31

    P3:
      kind: nokia_srlinux
      mgmt-ipv4: 172.20.20.13
      group: core
      startup-config: |
        set / interface ethernet-1/1 admin-state enable
        set / interface ethernet-1/1 subinterface 0 admin-state enable
        set / interface ethernet-1/1 subinterface 0 ipv4 admin-state enable
        set / interface ethernet-1/1 subinterface 0 ipv4 address 10.1.13.1/31
        set / interface ethernet-1/2 admin-state enable
        set / interface ethernet-1/2 subinterface 0 admin-state enable
        set / interface ethernet-1/2 subinterface 0 ipv4 admin-state enable
        set / interface ethernet-1/2 subinterface 0 ipv4 address 10.1.23.1/31
        set / interface ethernet-1/3 admin-state enable
        set / interface ethernet-1/3 subinterface 0 admin-state enable
        set / interface ethernet-1/3 subinterface 0 ipv4 admin-state enable
        set / interface ethernet-1/3 subinterface 0 ipv4 address 10.1.34.0/31
        set / interface ethernet-1/10 admin-state enable
        set / interface ethernet-1/10 subinterface 0 admin-state enable
        set / interface ethernet-1/10 subinterface 0 ipv4 admin-state enable
        set / interface ethernet-1/10 subinterface 0 ipv4 address 10.2.3.0/31

    P4:
      kind: nokia_srlinux
      mgmt-ipv4: 172.20.20.14
      group: core
      startup-config: |
        set / interface ethernet-1/1 admin-state enable
        set / interface ethernet-1/1 subinterface 0 admin-state enable
        set / interface ethernet-1/1 subinterface 0 ipv4 admin-state enable
        set / interface ethernet-1/1 subinterface 0 ipv4 address 10.1.14.1/31
        set / interface ethernet-1/2 admin-state enable
        set / interface ethernet-1/2 subinterface 0 admin-state enable
        set / interface ethernet-1/2 subinterface 0 ipv4 admin-state enable
        set / interface ethernet-1/2 subinterface 0 ipv4 address 10.1.24.1/31
        set / interface ethernet-1/3 admin-state enable
        set / interface ethernet-1/3 subinterface 0 admin-state enable
        set / interface ethernet-1/3 subinterface 0 ipv4 admin-state enable
        set / interface ethernet-1/3 subinterface 0 ipv4 address 10.1.34.1/31

    PE-isp:
      kind: nokia_srlinux
      mgmt-ipv4: 172.20.20.21
      group: edge
      startup-config: |
        set / interface ethernet-1/1 admin-state enable
        set / interface ethernet-1/1 subinterface 0 admin-state enable
        set / interface ethernet-1/1 subinterface 0 ipv4 admin-state enable
        set / interface ethernet-1/1 subinterface 0 ipv4 address 10.2.1.1/31

    PE-nomad:
      kind: nokia_srlinux
      mgmt-ipv4: 172.20.20.22
      group: edge
      startup-config: |
        set / interface ethernet-1/1 admin-state enable
        set / interface ethernet-1/1 subinterface 0 admin-state enable
        set / interface ethernet-1/1 subinterface 0 ipv4 admin-state enable
        set / interface ethernet-1/1 subinterface 0 ipv4 address 10.2.2.1/31

    PE-site:
      kind: nokia_srlinux
      mgmt-ipv4: 172.20.20.23
      group: edge
      startup-config: |
        set / interface ethernet-1/1 admin-state enable
        set / interface ethernet-1/1 subinterface 0 admin-state enable
        set / interface ethernet-1/1 subinterface 0 ipv4 admin-state enable
        set / interface ethernet-1/1 subinterface 0 ipv4 address 10.2.3.1/31

    dns-as12:
      kind: linux
      image: internetsystemsconsortium/bind9:9.21
      mgmt-ipv4: 172.20.20.30
      group: services
      binds:
        - ./dns:/etc/bind

    net-isp:
      kind: bridge
    net-nomad:
      kind: bridge
    net-site:
      kind: bridge

  links:
    - endpoints: ["P1:e1-1", "P2:e1-1"]
    - endpoints: ["P1:e1-2", "P3:e1-1"]
    - endpoints: ["P1:e1-3", "P4:e1-1"]
    - endpoints: ["P2:e1-2", "P3:e1-2"]
    - endpoints: ["P2:e1-3", "P4:e1-2"]
    - endpoints: ["P3:e1-3", "P4:e1-3"]

    - endpoints: ["P1:e1-10", "PE-isp:e1-1"]
    - endpoints: ["P2:e1-10", "PE-nomad:e1-1"]
    - endpoints: ["P3:e1-10", "PE-site:e1-1"]

    - endpoints: ["PE-isp:e1-2",   "net-isp:pe-isp-port"]
    - endpoints: ["PE-nomad:e1-2", "net-nomad:pe-nomad-port"]
    - endpoints: ["PE-site:e1-2",  "net-site:pe-site-port"]

    - endpoints: ["dns-as12:eth1", "net-site:dns-site-port"]
    - endpoints: ["dns-as12:eth2", "net-nomad:dns-nomad-port"]
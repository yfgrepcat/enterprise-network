# DHCP service for the enterprise lab
# Intended to run on the DHCP1 node inside the primary site.
#
# Address plan used by this config:
# - DHCP server IP: 120.0.164.10/24 on eth1
# - Client pool:    120.0.164.100-120.0.164.200
# - Gateway:        120.0.164.1
# - DNS server:     120.0.164.10 (same node, acting as DHCP + DNS forwarder)

interface=eth1
bind-interfaces
except-interface=lo
listen-address=120.0.164.10

dhcp-authoritative

dhcp-range=120.0.164.100,120.0.164.200,255.255.255.0,12h

dhcp-option=option:router,120.0.164.1
dhcp-option=option:dns-server,120.0.164.10
dhcp-option=option:domain-name,"enterprise.local"
dhcp-option=option:domain-search,"enterprise.local"

# Basic DNS forwarding so this node can also answer name lookups later.
server=1.1.1.1
server=8.8.8.8

# Keep the lease database in a predictable place.
dhcp-leasefile=/var/lib/misc/dnsmasq.leases
log-dhcp
log-facility=/var/log/dnsmasq.log
